services:
  app:
    build: .
    ports:
      - "8005:8005"               # Correction : le conteneur écoute sur 8005
    environment:
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend/chroma_db:/app/backend/chroma_db
      - ./data:/app/data
    restart: unless-stopped